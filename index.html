            top: 50%;
            width: 16px;
            height: 16px;

// === UTILITY: formatNumber ===
function formatNumber(value, type) {
    if (value === null || value === undefined || value === '') return '<span class="badge-na">N/A</span>';
    var num = parseFloat(value);
    if (isNaN(num)) return '<span class="badge-na">N/A</span>';
    switch (type) {
        case 'integer':
            if (Math.abs(num) >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (Math.abs(num) >= 1000) return (num / 1000).toFixed(1) + 'K';
            return Math.round(num).toLocaleString('ru-RU');
        case 'currency':
            if (Math.abs(num) >= 1000000) return (num / 1000000).toFixed(1) + 'M \u20BD';
            if (Math.abs(num) >= 10000) return (num / 1000).toFixed(1) + 'K \u20BD';
            return num.toLocaleString('ru-RU') + ' \u20BD';
        case 'percent':
            return num.toFixed(1) + '%';
        case 'rating':
            var full = Math.floor(num);
            var half = (num - full) >= 0.5 ? 1 : 0;
            var empty = 5 - full - half;
            var stars = '';
            for (var i = 0; i < full; i++) stars += '\u2605';
            if (half) stars += '\u00BD';
            for (var j = 0; j < empty; j++) stars += '<span class="empty">\u2605</span>';
            return '<span class="rating-stars">' + stars + '</span>';
        default:
            return Number.isInteger(num) ? num.toLocaleString('ru-RU') : num.toFixed(2);
    }
}

function formatNumberText(value, type) {
    if (value === null || value === undefined || value === '') return 'N/A';
    var num = parseFloat(value);
    if (isNaN(num)) return 'N/A';
    switch (type) {
        case 'integer':
            if (Math.abs(num) >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (Math.abs(num) >= 1000) return (num / 1000).toFixed(1) + 'K';
            return Math.round(num).toLocaleString('ru-RU');
        case 'currency':
            if (Math.abs(num) >= 1000000) return (num / 1000000).toFixed(1) + 'M \u20BD';
            if (Math.abs(num) >= 10000) return (num / 1000).toFixed(1) + 'K \u20BD';
            return num.toLocaleString('ru-RU') + ' \u20BD';
        case 'rating':
            return num.toFixed(1) + ' / 5';
        default:
            return Number.isInteger(num) ? num.toLocaleString('ru-RU') : num.toFixed(2);
    }
}

// === BADGE RENDERER ===
function badgeRenderer(val) {
    if (!val || val === 'N/A' || val === 'n/a') return '<span class="badge-na">N/A</span>';
    var v = String(val).trim().toLowerCase();
    if (v.startsWith('да')) return '<span class="badge-yes">Да</span>';
    if (v === 'нет') return '<span class="badge-no">Нет</span>';
    return '<span class="badge-partial">' + val + '</span>';
}

    var prices = allData.map(function(d) { return d['\u0426\u0435\u043d\u0430 (\u0440\u0443\u0431/\u043c\u0435\u0441)']; }).filter(function(p) { return p !== null && p !== undefined && !isNaN(parseFloat(p)) && parseFloat(p) > 0; }).map(Number).sort(function(a,b){return a-b;});
    var medianPrice = 0;
    if (prices.length > 0) {

    var avgRating = ratings.length > 0 ? (ratings.reduce(function(a,b){return a+b;},0) / ratings.length).toFixed(1) : 'N/A';

    var kpis = [

    ];

    kpis.forEach(function(kpi) {

        card.className = 'glass-card rounded-xl p-4 flex flex-col justify-between';
        card.innerHTML =

// === FILTERS ===
function buildFilters() {
    var dropdownContainer = document.getElementById('filter-dropdowns');
    var rangeContainer = document.getElementById('filter-range-sliders');
    dropdownContainer.innerHTML = '';
    rangeContainer.innerHTML = '';

    // Dropdown: Бесплатный тариф
    var freeValues = ['Все', 'Да', 'Нет'];
    dropdownContainer.innerHTML +=
        '<div class="mb-3">' +
            '<label class="block text-xs uppercase tracking-wider text-slate-400 mb-1">\u0411\u0435\u0441\u043f\u043b\u0430\u0442\u043d\u044b\u0439 \u0442\u0430\u0440\u0438\u0444</label>' +
            '<select id="filter-free" onchange="applyFilters()" class="w-full px-3 py-2 bg-surface border border-border rounded-lg text-sm text-white focus:outline-none focus:ring-1 focus:ring-blue-500">' +
                freeValues.map(function(v) { return '<option value="' + v + '">' + v + '</option>'; }).join('') +
            '</select>' +
        '</div>';

    // Dropdown: Русский интерфейс
    var ruValues = ['Все', 'Да', 'Нет'];
    dropdownContainer.innerHTML +=
        '<div class="mb-3">' +
            '<label class="block text-xs uppercase tracking-wider text-slate-400 mb-1">\u0420\u0443\u0441\u0441\u043a\u0438\u0439 \u0438\u043d\u0442\u0435\u0440\u0444\u0435\u0439\u0441</label>' +
            '<select id="filter-ru" onchange="applyFilters()" class="w-full px-3 py-2 bg-surface border border-border rounded-lg text-sm text-white focus:outline-none focus:ring-1 focus:ring-blue-500">' +
                ruValues.map(function(v) { return '<option value="' + v + '">' + v + '</option>'; }).join('') +
            '</select>' +
        '</div>';

    // Range slider: Price
    var allPrices = allData.map(function(d) { return d['\u0426\u0435\u043d\u0430 (\u0440\u0443\u0431/\u043c\u0435\u0441)']; }).filter(function(p) { return p !== null && p !== undefined && !isNaN(parseFloat(p)) && parseFloat(p) > 0; }).map(Number);
    if (allPrices.length > 0) {
        var minP = Math.min.apply(null, allPrices);
        var maxP = Math.max.apply(null, allPrices);
        rangeContainer.innerHTML =
            '<div class="mb-3">' +
                '<label class="block text-xs uppercase tracking-wider text-slate-400 mb-1">\u0426\u0435\u043d\u0430 (\u0440\u0443\u0431/\u043c\u0435\u0441)</label>' +
                '<div class="flex items-center gap-2">' +
                    '<input type="number" id="price-min" value="' + minP + '" min="' + minP + '" max="' + maxP + '" ' +
                        'class="w-full px-2 py-1 bg-surface border border-border rounded text-sm text-white text-center" oninput="applyFilters()">' +
                    '<span class="text-slate-400 text-xs">\u2014</span>' +
                    '<input type="number" id="price-max" value="' + maxP + '" min="' + minP + '" max="' + maxP + '" ' +
                        'class="w-full px-2 py-1 bg-surface border border-border rounded text-sm text-white text-center" oninput="applyFilters()">' +
                '</div>' +
                '<div class="range-slider-labels mt-1"><span>' + formatNumberText(minP, 'currency') + '</span><span>' + formatNumberText(maxP, 'currency') + '</span></div>' +
            '</div>';
    }
}

function applyFilters() {
    var search = (document.getElementById('search-input').value || '').toLowerCase();
    var freeFilter = document.getElementById('filter-free') ? document.getElementById('filter-free').value : 'Все';
    var ruFilter = document.getElementById('filter-ru') ? document.getElementById('filter-ru').value : 'Все';
    var priceMin = document.getElementById('price-min') ? parseFloat(document.getElementById('price-min').value) : 0;
    var priceMax = document.getElementById('price-max') ? parseFloat(document.getElementById('price-max').value) : Infinity;

    filteredData = allData.filter(function(d) {
        // Search
        if (search) {
            var match = false;
            for (var key in d) {
                if (String(d[key] || '').toLowerCase().indexOf(search) !== -1) { match = true; break; }
            }
            if (!match) return false;
        }

        // Free plan filter
        if (freeFilter !== 'Все') {
            var fv = String(d['\u0411\u0435\u0441\u043f\u043b\u0430\u0442\u043d\u044b\u0439 \u0442\u0430\u0440\u0438\u0444'] || '').toLowerCase();
            if (freeFilter === 'Да' && !fv.startsWith('да')) return false;
            if (freeFilter === 'Нет' && fv.startsWith('да')) return false;
        }

        // Russian UI filter
        if (ruFilter !== 'Все') {
            var rv = String(d['\u0420\u0443\u0441\u0441\u043a\u0438\u0439 \u0438\u043d\u0442\u0435\u0440\u0444\u0435\u0439\u0441'] || '').toLowerCase();
            if (ruFilter === 'Да' && !rv.startsWith('да')) return false;
            if (ruFilter === 'Нет' && rv.startsWith('да')) return false;
        }

        // Price range
        if (!isNaN(priceMin) || !isNaN(priceMax)) {
            var price = parseFloat(d['\u0426\u0435\u043d\u0430 (\u0440\u0443\u0431/\u043c\u0435\u0441)']);
            if (!isNaN(price) && price > 0) {
                if (!isNaN(priceMin) && price < priceMin) return false;
                if (!isNaN(priceMax) && price > priceMax) return false;
            }
        }

        return true;
    });

    document.getElementById('record-count').textContent = filteredData.length;

    // Update charts
    renderPrimaryChart();
    renderComparisonChart();

    // Update table
    if (gridApi) {
        gridApi.setGridOption('rowData', filteredData);
    }
}

function resetFilters() {
    document.getElementById('search-input').value = '';
    if (document.getElementById('filter-free')) document.getElementById('filter-free').value = 'Все';
    if (document.getElementById('filter-ru')) document.getElementById('filter-ru').value = 'Все';

    var allPrices = allData.map(function(d) { return d['\u0426\u0435\u043d\u0430 (\u0440\u0443\u0431/\u043c\u0435\u0441)']; }).filter(function(p) { return p !== null && p !== undefined && !isNaN(parseFloat(p)) && parseFloat(p) > 0; }).map(Number);
    if (allPrices.length > 0) {
        if (document.getElementById('price-min')) document.getElementById('price-min').value = Math.min.apply(null, allPrices);
        if (document.getElementById('price-max')) document.getElementById('price-max').value = Math.max.apply(null, allPrices);
    }

    applyFilters();
}

    if (site && site !== 'N/A') {
        var url = site.startsWith('http') ? site : 'https://' + site;
        html += '<div class="detail-field"><div class="detail-label">\u0421\u0430\u0439\u0442</div><div class="detail-value"><a href="' + url + '" target="_blank" rel="noopener" style="color:#60a5fa">' + site + '</a></div></div>';
    }

    // Source
    html += '<div class="detail-field"><div class="detail-label">\u0418\u0441\u0442\u043e\u0447\u043d\u0438\u043a</div><div class="detail-value"><a href="' + (row['\u0418\u0441\u0442\u043e\u0447\u043d\u0438\u043a'] || '#') + '" target="_blank" rel="noopener" style="color:#60a5fa;font-size:12px;word-break:break-all">' + (row['\u0418\u0441\u0442\u043e\u0447\u043d\u0438\u043a'] || 'N/A') + '</a></div></div>';

    content.innerHTML = html;
    panel.classList.add('open');
    overlay.classList.add('open');
}

function closeDetailPanel() {
    document.getElementById('detail-panel').classList.remove('open');
    document.getElementById('detail-overlay').classList.remove('open');
}

// === EXPORT CSV ===
function exportCsv() {
    var headers = Object.keys(filteredData[0] || {});
    var csv = '\uFEFF' + headers.join(',') + '\n';
    filteredData.forEach(function(row) {
        csv += headers.map(function(h) {
            var v = row[h];
            if (v === null || v === undefined) return '';
            v = String(v).replace(/"/g, '""');
            return '"' + v + '"';
        }).join(',') + '\n';
    });
    var blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'crm-systems-2026.csv';
    a.click();
}

// === SIDEBAR TOGGLE ===
function toggleSidebar() {
    document.getElementById('filter-sidebar').classList.toggle('open');
}

// === ESC KEY ===
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeDetailPanel();
});

// === WINDOW RESIZE ===
window.addEventListener('resize', function() {
    if (chartInstances.primary) chartInstances.primary.resize();
    if (chartInstances.comparison) chartInstances.comparison.resize();
});

// === INIT ===
(function init() {
    renderLoadingSkeleton();

    setTimeout(function() {
        document.getElementById('record-count').textContent = allData.length;
        renderKPIs();
        buildFilters();
        renderPrimaryChart();
        renderComparisonChart();
        renderTable();
        if (window.lucide) lucide.createIcons();
    }, 400);
})();
</script>
